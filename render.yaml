# Render Blueprint — one-click deploy: https://render.com/docs/infrastructure-as-code
# After deploy, set ROBOFLOW_API_KEY in the dashboard (never commit secrets).
services:
  - type: web
    name: trace
    runtime: docker
    plan: starter
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: TRACE_CONFIG
        value: config/roboflow-fast.yaml
      - key: TRACE_LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: ROBOFLOW_WORKSPACE
        value: prakhar-parkar
      - key: ROBOFLOW_WORKFLOW_ID
        value: general-segmentation-api-4
      - key: ROBOFLOW_HELMET_MODEL_ID
        value: helmet-gj8do/2
      - key: ROBOFLOW_OCR_MODEL_ID
        value: ocr-character-cgtzm/4
      - key: ROBOFLOW_API_KEY
        sync: false
