name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Lightweight test suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      # The suite is designed to run WITHOUT the heavy ML stack
      # (torch/ultralytics/easyocr) so CI stays fast and deterministic.
      - name: Run tests
        run: pytest -q --cov=trace_cv --cov-report=term-missing
