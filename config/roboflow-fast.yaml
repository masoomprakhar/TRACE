# TRACE — low-latency profile (CPU / demo / Render).
#   export TRACE_CONFIG=config/roboflow-fast.yaml
#
# Changes vs config/roboflow.yaml:
#   - Smaller YOLO input (480)
#   - No per-crop Roboflow plate workflow (uses VioVision plate boxes + ROI OCR)
#   - EasyOCR locally (no hosted OCR round-trip per plate)
#   - Preprocessing off (saves ~50–150 ms on clean daylight frames)
#   - Caps OCR to 3 plate reads per frame

device: cpu
preprocess: false
max_plate_ocr: 3
storage_dir: data/output
db_url: sqlite:///data/trace.db

models:
  detector: viovision/runs/detect/runs/train/viovision_yolo11n/weights/best.pt
  rider_backend: cnn
  rider_cnn_weights: models/weights/rider_multilabel_cnn.pt
  helmet: null
  helmet_backend: roboflow
  roboflow_helmet_workflow_id: general-segmentation-api-4
  roboflow_helmet_classes: "helmet, no_helmet"
  roboflow_helmet_model_id: null
  seatbelt: models/weights/seatbelt.pt
  plate: null
  plate_backend: null
  roboflow_workspace: prakhar-parkar
  roboflow_workflow_id: general-segmentation-api-4
  roboflow_plate_classes: license_plate
  ocr_backend: easyocr
  roboflow_ocr_model_id: ocr-character-cgtzm/4
  roboflow_ocr_workflow_id: null
  trocr_model_path: models/weights/trocr_plate
  ocr_langs: [en]
  detector_imgsz: 480
  detector_backend: viovision
  detector_class_map:
    two_wheeler: motorcycle
    signal_light: traffic_light
    license_plate: license_plate
    windshield: windshield

thresholds:
  detection_conf: 0.35
  nms_iou: 0.45
  helmet_conf: 0.55
  seatbelt_conf: 0.65
  triple_riding_min: 3
  confirm_frames: 3
  parking_seconds: 30.0
  stationary_iou: 0.90
  rider_overlap: 0.20

scene:
  fps: 15.0
  stop_line:
    enabled: true
    y: 380
  lane:
    enabled: true
    divider_x: 480
    correct_direction: down
  signal:
    enabled: true
    bbox: [700, 24, 790, 108]
  no_parking_zones: []
