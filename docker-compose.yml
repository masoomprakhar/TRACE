# TRACE — local stack. Defaults to SQLite + on-disk evidence (no extra
# services needed). Uncomment the `db` service to switch to PostgreSQL.
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - TRACE_LOG_LEVEL=INFO
      # - TRACE_CONFIG=/app/config/default.yaml
