# Fly.io — deploy: fly launch && fly secrets set ROBOFLOW_API_KEY=... && fly deploy
app = "trace-demo"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  TRACE_CONFIG = "config/roboflow-fast.yaml"
  TRACE_LOG_LEVEL = "INFO"
  PYTHONUNBUFFERED = "1"
  WEB_CONCURRENCY = "1"
  ROBOFLOW_WORKSPACE = "prakhar-parkar"
  ROBOFLOW_WORKFLOW_ID = "general-segmentation-api-4"
  ROBOFLOW_HELMET_MODEL_ID = "helmet-gj8do/2"
  ROBOFLOW_OCR_MODEL_ID = "ocr-character-cgtzm/4"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
